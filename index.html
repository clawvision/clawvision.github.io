<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>كريم | مطور ويب</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; min-height: 100vh; transition: 0.3s;
    }
    body.dark { background: #0f172a; }
    .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
    h1 { font-size: 3rem; margin-bottom: 1rem; }
    p { font-size: 1.2rem; opacity: 0.9; margin-bottom: 2rem; }
    .btn { background: white; color: #667eea; padding: 12px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; }
    .theme-btn { position: fixed; top: 20px; left: 20px; background: #22c55e; width: 50px; height: 50px; border-radius: 50%; border: none; font-size: 1.5rem; cursor: pointer; z-index: 100; }
    #about { padding: 100px 20px; text-align: center; max-width: 800px; margin: auto; }
    #about h2 { font-size: 2.5rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <button class="theme-btn" onclick="toggleTheme()">🌙</button>
  <section class="hero">
    <h1>مرحباً، أنا كريم</h1>
    <p>مطور ويب أحوّل الأفكار إلى مواقع تفاعلية سريعة وأنيقة</p>
    <a href="#about" class="btn">اكتشف المزيد</a>
  </section>
  <section id="about">
    <h2>من أنا</h2>
    <p>أنا كريم، مطور ويب من الجزائر. متخصص في بناء مواقع وتطبيقات ويب حديثة باستخدام HTML, CSS, JavaScript. نحب التصميم النظيف والتجربة السلسة.</p>
  </section>
  <script>
    function toggleTheme() {
      document.body.classList.toggle('dark');
      document.querySelector('.theme-btn').textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
      localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    }
    if(localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
      document.querySelector('.theme-btn').textContent = '☀️';
    }
  </script>

  <section id="contact" style="padding:100px 20px; text-align:center;">
    <h2 style="font-size:2.5rem; margin-bottom:1rem;">تواصل معي</h2>
    <div style="display:flex; gap:15px; justify-content:center;">
      <a href="mailto: allelkarim98@gmail.com" style="background:#EA4335; color:white; padding:15px 30px; border-radius:50px; text-decoration:none;">📧 ايميل</a>
      <a href="https://wa.me/213665934656" target="_blank" style="background:#25D366; color:white; padding:15px 30px; border-radius:50px; text-decoration:none;">💬 واتساب</a>
    </div>
  </section>

</body>
</html>
