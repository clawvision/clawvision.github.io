<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawVision | رؤية المستقبل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --bg-card: rgba(255,255,255,0.05); --text: white; --text-muted: #b3b3b3; --accent: #00ff88; --accent2: #00aaff; }
        [data-theme="light"] { --bg: #f5f5f5; --bg-card: rgba(0,0,0,0.05); --text: #1a1a1a; --text-muted: #555; --accent: #00cc6a; --accent2: #0088cc; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; transition: 0.3s; }
        .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; background: radial-gradient(circle at top, #1a1a1a, #000000); position: relative; }
        [data-theme="light"] .hero { background: radial-gradient(circle at top, #e0e0e0, #ffffff); }
        .glow { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(0,255,136,0.15) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); filter: blur(50px); }
        .content { z-index: 2; max-width: 800px; }
        .theme-btn { position: fixed; top: 20px; left: 20px; background: var(--bg-card); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 12px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; z-index: 100; backdrop-filter: blur(10px); }
        h1 { font-size: 3.5rem; font-weight: 900; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        p { font-size: 1.3rem; color: var(--text-muted); margin-bottom: 40px; line-height: 1.8; }
        .btn { display: inline-block; padding: 15px 35px; background: linear-gradient(90deg, var(--accent), var(--accent2)); color: #000; text-decoration: none; font-weight: 700; border-radius: 50px; transition: 0.3s; box-shadow: 0 0 30px rgba(0,255,136,0.3); }
        .btn:hover { transform: scale(1.05); }
        .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 80px; }
        .card { background: var(--bg-card); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); opacity: 0; transform: translateY(30px); transition: 0.6s ease; }
        [data-theme="light"] .card { border: 1px solid rgba(0,0,0,0.1); }
        .card.show { opacity: 1; transform: translateY(0); }
        .card h3 { color: var(--accent); margin-bottom: 10px; font-size: 1.4rem; }
        footer { text-align: center; padding: 30px; color: #666; border-top: 1px solid #1a1a1a; }
        @media (max-width: 600px) { h1 { font-size: 2.5rem; } p { font-size: 1.1rem; } }
    </style>
</head>
<body>
    <button class="theme-btn" onclick="toggleTheme()">🌙</button>
    <section class="hero">
        <div class="glow"></div>
        <div class="content">
            <h1>ClawVision 🚀</h1>
            <p>نبني المستقبل، سطر كود بسطر كود<br>هذا أول مشروع رسمي لـ كريم من Constantine</p>
            <a href="#features" class="btn">اكتشف المزيد</a>
            <div class="features" id="features">
                <div class="card"><h3>⚡ سريع</h3><p>مبني على Vercel بأسرع تقنيات الويب</p></div>
                <div class="card"><h3>📱 متجاوب</h3><p>يخدم على الهاتف والكمبيوتر بنفس الجودة</p></div>
                <div class="card"><h3>🔥 حديث</h3><p>تصميم 2026 بلمسة احترافية عصرية</p></div>
            </div>
        </div>
    </section>
    <footer><p>© 2026 ClawVision - صنع بـ 💚 في الجزائر</p></footer>
    <script>
        const cards = document.querySelectorAll('.card');
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('show'); });
        });
        cards.forEach(card => observer.observe(card));
        function toggleTheme() {
            const body = document.body;
            const btn = document.querySelector('.theme-btn');
            if(body.getAttribute('data-theme') === 'light') {
                body.removeAttribute('data-theme');
                btn.textContent = '🌙';
            } else {
                body.setAttribute('data-theme', 'light');
                btn.textContent = '☀️';
            }
        }
    </script>
</body>
</html>
