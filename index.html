<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawVision - برمجة الروبوتات الصناعية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: #161b22;
            padding: 40px;
            border-radius: 10px;
            border: 1px solid #30363d;
        }
        h1 { color: #58a6ff; font-size: 2.8em; margin-bottom: 10px; }
        h2 { color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 10px; margin-top: 40px; }
        .subtitle { color: #8b949e; font-size: 1.2em; margin-bottom: 30px; }
        .btn {
            background-color: #238636;
            color: white;
            padding: 14px 30px;
            text-decoration: none;
            border-radius: 6px;
            display: inline-block;
            margin-top: 20px;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn:hover { background-color: #2ea043; }
        .tech {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .tech-item { text-align: center; }
        .tech-item img {
            height: 50px;
            filter: grayscale(1) brightness(1.5);
            transition: 0.3s;
        }
        .tech-item img:hover {
            filter: grayscale(0) brightness(1);
            transform: scale(1.1);
        }
        .tech-item p { margin-top: 10px; font-size: 0.9em; color: #8b949e; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ClawVision</h1>
        <p class="subtitle">حلول برمجية متقدمة للروبوتات الصناعية: FANUC، KUKA، Yaskawa</p>
        <a href="mailto:contact@clawvision.com" class="btn">اطلب عرض سعر</a>
        
        <h2>نعتمد على أحدث التقنيات العالمية</h2>
        <div class="tech">
            <div class="tech-item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/32/OpenCV_Logo_with_text_svg_version.svg" alt="OpenCV">
                <p>OpenCV</p>
            </div>
            <div class="tech-item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/7/7d/Intel_logo_%282006-2020%29.svg" alt="Intel">
                <p>Intel</p>
            </div>
            <div class="tech-item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/9/96/OpenVINO_logo.png" alt="OpenVINO">
                <p>OpenVINO</p>
            </div>
            <div class="tech-item">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Python-logo-notext.svg" alt="Python">
                <p>Python</p>
            </div>
        </div>
    </div>
</body>
</html>
