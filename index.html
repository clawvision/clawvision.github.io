<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawVision - AI for Industrial Robots</title>
    <meta name="description" content="برمجيات ذكاء اصطناعي للروبوتات الصناعية Fanuc, ABB, Kuka تعمل 24/7">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0d1117; 
            color: #c9d1d9; 
            font-family: 'Cairo', sans-serif; 
            line-height: 1.6;
        }
        .container { max-width: 1100px; margin: auto; padding: 0 20px; }
        .hero {
            text-align: center;
            padding: 120px 20px;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
        }
        h1 { 
            color: #58a6ff; 
            font-size: 3.5rem;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 1.4rem;
            color: #8b949e;
            margin-bottom: 30px;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 40px 0;
            flex-wrap: wrap;
        }
        .stat {
            background: #161b22;
            padding: 20px 40px;
            border-radius: 8px;
            border: 1px solid #30363d;
        }
        .stat h3 { color: #3fb950; font-size: 2rem; }
        .tech {
            padding: 80px 20px;
            text-align: center;
        }
        .tech-badges {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 30px;
        }
        .badge {
            background: #1f6feb;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
        }
        .btn {
            background: #238636;
            color: white;
            padding: 14px 35px;
            border-radius: 6px;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            font-weight: 600;
            font-size: 1.1rem;
        }
        footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid #30363d;
            color: #8b949e;
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="container">
            <h1>ClawVision 🤖</h1>
            <p class="subtitle">برمجيات ذكاء اصطناعي للروبوتات الصناعية تعمل 24/7 بدون توقف</p>
            
            <div class="stats">
                <div class="stat">
                    <h3>99.2%</h3>
                    <p>Uptime</p>
                </div>
                <div class="stat">
                    <h3>24/7</h3>
                    <p>تشغيل متواصل</p>
                </div>
                <div class="stat">
                    <h3>Fanuc, ABB, Kuka</h3>
                    <p>متوافق مع</p>
                </div>
            </div>

            <a href="mailto:open-claw-ai" class="btn">تواصل معنا</a>
        </div>
    </section>

    <section class="tech">
        <div class="container">
            <h2>التقنيات اللي نخدمو بيها</h2>
            <div class="tech-badges">
                <span class="badge">Python</span>
                <span class="badge">C++</span>
                <span class="badge">ROS</span>
                <span class="badge">TensorFlow</span>
                <span class="badge">Rapid</span>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 ClawVision | Karim Allel | Open Claw AI</p>
    </footer>
</body>
</html>
