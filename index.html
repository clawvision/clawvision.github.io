<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClawVision | رؤية المستقبل</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    html {
      scroll-behavior: smooth;
    }

    :root {
      --bg: #0a0a0a;
      --bg-card: rgba(255,255,255,0.05);
      --text: white;
      --text-muted: #b3b3b3;
      --accent: #00ff88;
      --accent2: #00aaff;
    }

    [data-theme="light"] {
      --bg: #f5f5f5;
      --bg-card: rgba(0,0,0,0.05);
      --text: #1a1a1a;
      --text-muted: #555;
      --accent: #00cc6a;
      --accent2: #0088cc;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      transition: 0.3s;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      background: radial-gradient(circle at 20% 30%, #00f5d420 0%, transparent 50%),
                  radial-gradient(circle at 80% 70%, #00f5d415 0%, transparent 50%);
      position: relative;
    }

    [data-theme="light"] .hero {
      background: radial-gradient(circle at 20% 30%, #00f5d410 0%, transparent 50%),
                  radial-gradient(circle at 80% 70%, #00f5d408 0%, transparent 50%);
    }

    .about-section {
      min-height: 100vh;
      padding: 120px 20px 60px;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .about-section h2 {
      font-size: 2.5rem;
      margin-bottom: 30px;
      color: var(--accent);
    }

    .about-section p {
      font-size: 1.2rem;
      line-height: 1.8;
      max-width: 700px;
      margin: 0 auto 15px;
    }
  </style>
</head>
<body>

  <section class="hero">
    <div>
      <h1>ClawVision</h1>
      <p>نصنع المستقبل بالتقنية</p>
      <a href="#about">اكتشف المزيد</a>
    </div>
  </section>

  <section id="about" class="about-section">
    <h2>من أنا</h2>
    <p>أنا كريم، مطور ومصمم واجهات شغوف بالتقنية والابتكار.</p>
    <p>أعمل على بناء تجارب رقمية تجمع بين الجمال والأداء.</p>
  </section>

</body>
</html>
